name: Cron Jobs

on:
  schedule:
    # Har kuni soat 09:00 UTC (O'zbekiston 14:00) — muddati o'tgan qarzlarni tekshirish
    - cron: "0 9 * * *"
    # Har kuni soat 20:00 UTC (O'zbekiston 01:00) — kunlik hisobot
    - cron: "0 20 * * *"
  workflow_dispatch: # Qo'lda ham ishga tushirish mumkin

jobs:
  check-overdue:
    name: Muddati o'tgan qarzlarni tekshirish
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 9 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Call check-overdue API
        run: |
          curl -s -X GET "${{ secrets.APP_URL }}/api/cron/check-overdue" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -w "\nHTTP Status: %{http_code}\n"

  daily-report:
    name: Kunlik hisobot yuborish
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 20 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Call daily-report API
        run: |
          curl -s -X GET "${{ secrets.APP_URL }}/api/cron/daily-report" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -w "\nHTTP Status: %{http_code}\n"
